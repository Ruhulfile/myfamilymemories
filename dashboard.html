<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Family Memories - Dashboard</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#eef3f8;

}

header{

background:#1f2937;

color:white;

padding:18px;

text-align:center;

font-size:24px;

font-weight:bold;

}

.container{

padding:20px;

}

.card{

background:white;

border-radius:15px;

padding:20px;

margin-bottom:20px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

button{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:10px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

.wallpaper{

background:#3b82f6;

color:white;

}

.album{

background:#10b981;

color:white;

}

.upload{

background:#f59e0b;

color:white;

}

.admin{

background:#ef4444;

color:white;

}

.logout{

background:#374151;

color:white;

}

</style>

</head>

<body>

<header>

My Family Memories

</header>

<div class="container">

<div class="card">

<h2>Welcome Admin 👋</h2>

<p>

Manage your family memories safely.

</p>

<button class="wallpaper">

🖼 Change Wallpaper

</button>

<button class="album">

📁 Create Album

</button>

<button class="upload">

📸 Upload Photos

</button>

<button class="admin">

👑 Admin Panel

</button>

<button class="logout"

onclick="location.href='login.html'">

Logout

</button>

</div>

</div>

</html>
