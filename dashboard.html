<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Family Memories - Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#eef3f8;

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

}

header{

background:#1f2937;

color:white;

padding:18px;

text-align:center;

font-size:24px;

font-weight:bold;

}

.container{

padding:20px;

}

.card{

background:white;

border-radius:15px;

padding:20px;

margin-bottom:20px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

button{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:10px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

.wallpaper{

background:#3b82f6;

color:white;

}

.album{

background:#10b981;

color:white;

}

.upload{

background:#f59e0b;

color:white;

}

.admin{

background:#ef4444;

color:white;

}

.logout{

background:#374151;

color:white;

}

#albumList{

margin-top:20px;

}

</style>

</head>

<body>

<header>

My Family Memories

</header>

<div class="container">

<div class="card">

<h2>Welcome Admin 👋</h2>

<p>

Manage your family memories safely.

</p>

<input
type="file"
id="wallpaperInput"
accept="image/*"
style="display:none;"
>

<button
class="wallpaper"
onclick="document.getElementById('wallpaperInput').click()">

🖼 Change Wallpaper

</button>

<button class="album">

📁 Create Album

</button>

<button class="upload">

📸 Upload Photos

</button>

<button class="admin">

👑 Admin Panel

</button>

<button class="logout" onclick="location.href='login.html'">

Logout

</button>

</div>

<div id="albumList"></div>

</div>

<script type="module" src="app.js"></script>

<script type="module" src="album.js"></script>

<script>

const wallpaperInput = document.getElementById("wallpaperInput");

wallpaperInput.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

alert("Wallpaper loaded successfully!");
  
document.body.style.backgroundImage =
"url('" + event.target.result + "')";

document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";

localStorage.setItem(
"wallpaper",
event.target.result
);

};

reader.readAsDataURL(file);

});

const savedWallpaper = localStorage.getItem("wallpaper");

if(savedWallpaper){

document.body.style.backgroundImage =
"url('" + savedWallpaper + "')";

document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";

}

</script>
  
</body>

</html>
