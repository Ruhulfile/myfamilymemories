<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album</title>

<style>

body{

font-family:Arial,sans-serif;

background:#eef3f8;

margin:0;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}

h1{

margin-bottom:20px;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

.upload{

background:#f59e0b;

color:white;

}

.back{

background:#374151;

color:white;

}

#photos{

margin-top:20px;

}

</style>

</head>

<body>

<div class="card">

<h1 id="albumTitle"></h1>

<input type="file" id="photoInput" accept="image/*" style="display:none;">

<button class="upload" onclick="document.getElementById('photoInput').click()">

📸 Upload Photo

</button>

<button class="back" onclick="location.href='dashboard.html'">

⬅ Back to Dashboard

</button>

<div id="photos">

<p>No photos yet.</p>

</div>

</div>

<script>

const album = localStorage.getItem("currentAlbum");

document.getElementById("albumTitle").innerHTML = "📁 " + album;
document.getElementById("photoInput").addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    alert("Photo selected: " + file.name + " 📸");
</script>

</body>

</html>
