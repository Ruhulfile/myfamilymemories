<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album</title>

<style>

body{
font-family:Arial,sans-serif;
background:#eef3f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.upload{
background:#f59e0b;
color:white;
}

.back{
background:#374151;
color:white;
}

#photos{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:15px;
}

.photoBox{
width:160px;
text-align:center;
}

.photoBox img{
width:100%;
border-radius:12px;
display:block;
cursor:pointer;
}

.deleteBtn{
margin-top:8px;
background:#ef4444;
color:white;
padding:10px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
}

#viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;
}

#viewer img{
max-width:95%;
max-height:90%;
border-radius:12px;
}

#closeViewer{
position:absolute;
top:20px;
right:25px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1 id="albumTitle"></h1>

<input
type="file"
id="photoInput"
accept="image/*"
multiple
style="display:none;"
>

<button class="upload"
onclick="document.getElementById('photoInput').click()">
📸 Upload Photo
</button>

<button class="back"
onclick="location.href='dashboard.html'">
⬅ Back to Dashboard
</button>

<div id="photos">
<p>No photos yet.</p>
</div>

</div>

<div id="viewer">
<span id="closeViewer">&times;</span>
<img id="viewerImg">
</div>

<script>
const album = localStorage.getItem("currentAlbum");

document.getElementById("albumTitle").innerHTML = "📁 " + album;

const photoInput = document.getElementById("photoInput");

const photos = document.getElementById("photos");

// Saved photos load

let savedPhotos = JSON.parse(localStorage.getItem(album)) || [];

photos.innerHTML = "";

savedPhotos.forEach(addPhoto);

// Upload

photoInput.addEventListener("change", function(e){

    const files = e.target.files;

    for(const file of files){

        const reader = new FileReader();

        reader.onload = function(event){

            savedPhotos.push(event.target.result);

            localStorage.setItem(album, JSON.stringify(savedPhotos));

            addPhoto(event.target.result);

        };

        reader.readAsDataURL(file);

    }

});

// Add Photo

function addPhoto(src){

    if(photos.innerHTML.includes("No photos yet")){

        photos.innerHTML = "";

    }

    const box = document.createElement("div");

    box.className = "photoBox";

    const img = document.createElement("img");

    img.src = src;

    img.onclick = function(){

        document.getElementById("viewer").style.display = "flex";

        document.getElementById("viewerImg").src = src;

    };

    const delBtn = document.createElement("button");

    delBtn.className = "deleteBtn";

    delBtn.innerHTML = "🗑 Delete";

    delBtn.onclick = function(){

        box.remove();

        savedPhotos = savedPhotos.filter(photo => photo !== src);

        localStorage.setItem(album, JSON.stringify(savedPhotos));

        if(savedPhotos.length===0){

            photos.innerHTML = "<p>No photos yet.</p>";

        }

    };

    box.appendChild(img);

    box.appendChild(delBtn);

    photos.appendChild(box);

}

// Close Viewer

document.getElementById("closeViewer").onclick = function(){

    document.getElementById("viewer").style.display = "none";

};

document.getElementById("viewer").onclick = function(e){

    if(e.target.id==="viewer"){

        this.style.display="none";

    }

};

</script>
